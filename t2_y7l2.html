<script>
const LESSON_ID=`t2_y7l2`;
const SLIDES = [
  { type:`intro`, title:`Rules for Communication`, body:`<p>All communication needs rules. When you write a letter, there are rules about format, address, and postage. Computers need rules too — these are called <strong>protocols</strong>.</p>
<div class="two-col">
<div class="card"><h4>Protocol</h4><p>A <strong>protocol</strong> is a set of rules that allows devices to communicate with each other. Without protocols, computers could send data in incompatible formats that other devices cannot understand.</p></div>
<div class="card"><h4>IP Address</h4><p>A <strong>unique identifier</strong> assigned to every networked device — like a postal address for your computer. Example: <code>192.168.4.8</code></p></div></div>
<div class="callout">🎯 <strong>Lesson goals:</strong> Describe the role of protocols in network communication, explain why IP addresses are needed, and identify valid IP address formats.</div>` },
  { type:`concept`, title:`Why Protocols Are Needed`, body:`<p>Without protocols, computers sending data to a network would not know:</p>
<ul>
<li>Which device the data is meant for</li>
<li>What format the data should be in</li>
<li>How to handle errors or missing data</li>
</ul>
<div class="callout">💡 <strong>Real-world analogy:</strong> Posting a letter has rules — correct address format, valid stamp, sealed envelope. Without these rules the postal service cannot deliver it. Computer protocols work the same way.</div>
<div class="two-col">
<div class="card"><h4>Email protocol example</h4><p>• Must include an @ symbol<br>• Address must be unique<br>• Format: <code>name@domain.com</code></p></div>
<div class="card"><h4>Website address protocol</h4><p>• Must start with <code>http://</code> or <code>https://</code><br>• Address must be unique<br>• Dots separate each part</p></div></div>
<div class="callout warn">⚠️ If a website address does not follow the correct protocol, <strong>the web page will not load</strong>.</div>` },
  { type:`concept`, title:`IP Addresses`, body:`<p>Every device on a network has a unique <strong>IP (Internet Protocol) address</strong> — a number that identifies it so data is delivered to the right place.</p>
<table class="bit-table">
<tr><th>Feature</th><th>Detail</th></tr>
<tr><td><strong>Format</strong></td><td>Four groups of numbers separated by dots: <code>192.168.25.1</code></td></tr>
<tr><td><strong>Range</strong></td><td>Each group is a number from 0 to 255</td></tr>
<tr><td><strong>Unique</strong></td><td>No two devices on the same network share an IP address</td></tr>
<tr><td><strong>Purpose</strong></td><td>Ensures data arrives at the correct device</td></tr>
</table>
<div class="two-col">
<div class="card"><h4>✅ Valid IP address</h4><p><code>192.168.25.1</code><br>Four groups, separated by dots, each 0–255</p></div>
<div class="card"><h4>❌ Invalid examples</h4><p><code>192-168-25-1</code> (hyphens not dots)<br><code>192.168.25</code> (only 3 groups)<br><code>192.168.25.256</code> (256 is out of range)</p></div></div>
<div class="callout">💡 The sender's IP address is always included on network messages so that if delivery fails, the sending device can be informed.</div>` },
  { type:`concept`, title:`Protocols in Action`, body:`<p>Protocols ensure data is transmitted reliably and efficiently across networks. Key protocols you need to know:</p>
<table class="bit-table">
<tr><th>Protocol</th><th>Full name</th><th>Purpose</th></tr>
<tr><td><strong>HTTP</strong></td><td>HyperText Transfer Protocol</td><td>Transfers web pages between browser and server</td></tr>
<tr><td><strong>HTTPS</strong></td><td>HTTP Secure</td><td>Encrypted version of HTTP — safe for passwords and payments</td></tr>
<tr><td><strong>TCP/IP</strong></td><td>Transmission Control Protocol / Internet Protocol</td><td>Core internet protocol — splits data into packets and routes them</td></tr>
<tr><td><strong>SMTP</strong></td><td>Simple Mail Transfer Protocol</td><td>Sending email</td></tr>
<tr><td><strong>DNS</strong></td><td>Domain Name System</td><td>Translates domain names to IP addresses</td></tr>
</table>
<div class="callout">🔑 The main reason computers need protocols: <strong>to ensure data is sent to the correct device in the correct format</strong>.</div>` },
  { type:`activity`, title:`Guided Tasks — Protocols & IP Addresses`, body:`<p>Test your knowledge of protocols and IP addresses.</p>
<div class="task-box"><h4>📝 Task A — Protocols</h4>
<div class="answer-row"><label>1. What is a protocol?</label><input class="ans-input" id="p1" placeholder="..."><button class="check-btn" onclick="schkAny('p1','fp1',['a set of rules for communication','set of rules','rules for devices to communicate'])">Check</button><span class="fb" id="fp1"></span></div>
<div class="answer-row"><label>2. What happens if a website address does not follow the correct protocol?</label><input class="ans-input" id="p2" placeholder="..."><button class="check-btn" onclick="schkAny('p2','fp2',['the web page will not load','it will not load','page won't load'])">Check</button><span class="fb" id="fp2"></span></div>
<div class="answer-row"><label>3. Why do computers need protocols on a network?</label><input class="ans-input" id="p3" placeholder="..."><button class="check-btn" onclick="schkAny('p3','fp3',['to send data to the correct device in the correct format','correct device correct format','ensure data arrives correctly'])">Check</button><span class="fb" id="fp3"></span></div>
</div>
<div class="task-box"><h4>📝 Task B — IP Addresses</h4>
<div class="answer-row"><label>4. What is an IP address?</label><input class="ans-input" id="p4" placeholder="..."><button class="check-btn" onclick="schkAny('p4','fp4',['a unique number assigned to a device','unique identifier for a device','unique number for a networked device'])">Check</button><span class="fb" id="fp4"></span></div>
<div class="answer-row"><label>5. Is 192.168.25.1 a valid IP address? Yes or No.</label><input class="ans-input" id="p5" placeholder="..."><button class="check-btn" onclick="schkAny('p5','fp5',['yes','Yes'])">Check</button><span class="fb" id="fp5"></span></div>
<div class="answer-row"><label>6. Is 192.168.25.256 a valid IP address? Yes or No.</label><input class="ans-input" id="p6" placeholder="..."><button class="check-btn" onclick="schkAny('p6','fp6',['no','No'])">Check</button><span class="fb" id="fp6"></span></div>
<div class="answer-row"><label>7. What protocol is used to securely transfer web pages?</label><input class="ans-input" id="p7" placeholder="..."><button class="check-btn" onclick="schkAny('p7','fp7',['https','HTTPS'])">Check</button><span class="fb" id="fp7"></span></div>
<div class="answer-row"><label>8. Why is the sender's IP address included on network messages?</label><input class="ans-input" id="p8" placeholder="..."><button class="check-btn" onclick="schkAny('p8','fp8',['so the sender can be informed if delivery fails','to inform sender of problems','delivery failure notification'])">Check</button><span class="fb" id="fp8"></span></div>
</div>` },
  { type:`summary`, title:`Lesson Summary`, body:`<ul>
<li>A <strong>protocol</strong> = a set of rules that allows devices to communicate with each other</li>
<li>Protocols ensure data is sent to the <strong>correct device in the correct format</strong></li>
<li>An <strong>IP address</strong> = a unique number (e.g. <code>192.168.25.1</code>) assigned to a networked device</li>
<li>Valid IP address: four groups of numbers (0–255) separated by dots</li>
<li>Key protocols: <strong>HTTP/HTTPS</strong> (web), <strong>TCP/IP</strong> (internet), <strong>SMTP</strong> (email), <strong>DNS</strong> (name lookup)</li>
<li>Sender IP address is always included so failed deliveries can be reported back</li>
</ul>
<div class="callout success">✅ Exit quiz answers: protocol = set of rules · email example = must have @ symbol · failed protocol = page won't load · reason for protocols = correct device correct format · IP = unique number · valid format = 192.168.25.1</div>` },
  { type:`compete`, title:`🏆 Protocols & IP Speed Round`, body:`<div class="compete-board"><h4>🏆 Protocols & IP Addresses Speed Round</h4>

  const typeLabel = s.type === 'compete' ? 'Competition' : s.type.charAt(0).toUpperCase() + s.type.slice(1);
  document.getElementById('slide').innerHTML =
    '<div class="eyebrow">' +
      '<span class="stype t-' + s.type + '">' + typeLabel + '</span>' +
      '<span class="snum">Slide ' + (cur+1) + ' of ' + total + '</span>' +
    '</div>' +
    '<h1>' + s.title + '</h1>' +
    '<div class="sb">' + (s.body || '') + '</div>';
  if (s.onRender) setTimeout(s.onRender, 80);
  document.getElementById('prog').style.width = ((cur+1)/total*100) + '%';
  document.getElementById('sctr').textContent = (cur+1) + ' / ' + total;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === total - 1;
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  SLIDES.forEach((sl, i) => {
    const d = document.createElement('div');
    const isCompete = sl.type === 'compete';
    d.className = 'pdot' + (isCompete ? ' compete-dot' : '') + (i===cur?' active':i<cur?' done':'');
    d.onclick = () => { cur=i; render(); };
    d.title = sl.title;
    dots.appendChild(d);
  });
}
function goNext() { if (cur < SLIDES.length-1) { cur++; render(); } }
function goPrev() { if (cur > 0) { cur--; render(); } }
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
});
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'filter') {
    document.body.classList.remove('nature-green','superpower');
    if (e.data.filter) document.body.classList.add(e.data.filter);
  }
});

// ── TASK CHECK HELPER ────────────────────────────────────────
function chk(inputId, fbId, correct) {
  const val = document.getElementById(inputId).value.trim().toLowerCase().replace(/\s+/g,'');
  const ans = String(correct).toLowerCase().replace(/\s+/g,'');
  const ok  = val === ans;
  const fb  = document.getElementById(fbId);
  fb.className = 'fb ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? '✓ Correct!' : '✗ Try again — answer: ' + correct;
}
function chkAny(inputId, fbId, answers) {
  const val = document.getElementById(inputId).value.trim().toLowerCase().replace(/\s+/g,'');
  const ok  = answers.map(a=>String(a).toLowerCase().replace(/\s+/g,'')).includes(val);
  const fb  = document.getElementById(fbId);
  fb.className = 'fb ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? '✓ Correct!' : '✗ Try again — answer: ' + answers[0];
}

// ── COMPETITION ENGINE ───────────────────────────────────────
let compState = { score:0, qIdx:0, timer:null, timeLeft:15, active:false, name:'' };

function startComp() {
  const nameEl = document.getElementById('comp-name');
  if (!nameEl || !nameEl.value.trim()) { alert('Enter your name first!'); return; }
  compState.name = nameEl.value.trim();
  compState.score = 0;
  compState.qIdx = 0;
  compState.active = true;
  document.getElementById('comp-start-area').style.display = 'none';
  document.getElementById('comp-game-area').style.display = 'block';
  document.getElementById('comp-end-area').style.display = 'none';
  nextCompQ();
}

function nextCompQ() {
  if (compState.qIdx >= COMP_Qs.length) { endComp(); return; }
  clearInterval(compState.timer);
  compState.timeLeft = 15;
  const q = COMP_Qs[compState.qIdx];
  document.getElementById('comp-q').textContent = q.q;
  document.getElementById('comp-ans').value = '';
  document.getElementById('comp-ans').focus();
  document.getElementById('comp-score').textContent = compState.score;
  document.getElementById('comp-qnum').textContent = (compState.qIdx+1) + ' / ' + COMP_Qs.length;
  document.getElementById('comp-feedback').textContent = '';
  updateTimer();
  compState.timer = setInterval(() => {
    compState.timeLeft--;
    updateTimer();
    if (compState.timeLeft <= 0) { clearInterval(compState.timer); autoWrong(); }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById('comp-timer-fill');
  const pct = (compState.timeLeft / 15) * 100;
  if (el) el.style.width = pct + '%';
  const tlEl = document.getElementById('comp-timeleft');
  if (tlEl) tlEl.textContent = compState.timeLeft + 's';
}

function submitCompAns() {
  if (!compState.active) return;
  clearInterval(compState.timer);
  const ans = document.getElementById('comp-ans').value.trim().toLowerCase().replace(/\s+/g,'');
  const q   = COMP_Qs[compState.qIdx];
  const ok  = q.answers.map(a=>String(a).toLowerCase().replace(/\s+/g,'')).includes(ans);
  const fb  = document.getElementById('comp-feedback');
  if (ok) {
    const pts = Math.max(1, compState.timeLeft);
    compState.score += pts;
    fb.style.color = 'var(--success)';
    fb.textContent = '✓ Correct! +' + pts + ' points';
  } else {
    fb.style.color = 'var(--danger)';
    fb.textContent = '✗ Answer: ' + q.answers[0];
  }
  compState.qIdx++;
  setTimeout(nextCompQ, 1200);
}

function autoWrong() {
  const q  = COMP_Qs[compState.qIdx];
  const fb = document.getElementById('comp-feedback');
  fb.style.color = 'var(--danger)';
  fb.textContent = '⏱ Time up! Answer: ' + q.answers[0];
  compState.qIdx++;
  setTimeout(nextCompQ, 1400);
}

function endComp() {
  compState.active = false;
  clearInterval(compState.timer);
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display = 'block';
  document.getElementById('comp-final-score').textContent = compState.score;
  document.getElementById('comp-final-name').textContent = compState.name;
  // Save to leaderboard
  const lb = JSON.parse(localStorage.getItem('ks3_lb_' + LESSON_ID) || '[]');
  lb.push({ name: compState.name, score: compState.score, date: new Date().toLocaleDateString() });
  lb.sort((a,b) => b.score - a.score);
  const top10 = lb.slice(0,10);
  localStorage.setItem('ks3_lb_' + LESSON_ID, JSON.stringify(top10));
  renderLeaderboard(top10);
}

function renderLeaderboard(lb) {
  const el = document.getElementById('leaderboard');
  if (!el) return;
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = lb.length === 0
    ? '<li style="color:var(--text-muted);font-size:13px">No scores yet — be the first!</li>'
    : lb.map((e,i) => '<li><span class="lb-pos">' + (medals[i]||'#'+(i+1)) + '</span><span class="lb-name">' + e.name + '</span><span class="lb-score">' + e.score + ' pts</span></li>').join('');
}

function resetComp() {
  document.getElementById('comp-start-area').style.display = 'block';
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display = 'none';
  compState = { score:0, qIdx:0, timer:null, timeLeft:15, active:false, name:'' };
}

document.addEventListener('keydown', e => {
  if (e.target.id === 'comp-ans' && e.key === 'Enter') { e.preventDefault(); submitCompAns(); }
});
render();


function setFilter(t){if(t==='ng'){document.body.classList.remove('superpower');const on=document.body.classList.toggle('nature-green');localStorage.setItem('ks3_ng',on?'1':'0');localStorage.setItem('ks3_sp','0');}else{document.body.classList.remove('nature-green');const on=document.body.classList.toggle('superpower');localStorage.setItem('ks3_sp',on?'1':'0');localStorage.setItem('ks3_ng','0');}syncFB();}
function syncFB(){const ng=document.body.classList.contains('nature-green'),sp=document.body.classList.contains('superpower');document.querySelectorAll('.ng-btn').forEach(b=>b.classList.toggle('on-ng',ng));document.querySelectorAll('.sp-btn').forEach(b=>b.classList.toggle('on-sp',sp));}
(function(){if(localStorage.getItem('ks3_ng')==='1')document.body.classList.add('nature-green');if(localStorage.getItem('ks3_sp')==='1')document.body.classList.add('superpower');syncFB();})();
</script></body></html>
