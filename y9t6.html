<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y9 — Pseudocode — Introduction & Practice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#22263a;--border:#353a5c;--accent:#00f0ff;--text:#f0f0ff;--text-muted:#9090c0;--success:#2ecc71;--warning:#f1c40f;--danger:#e74c3c;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}
.presentation{display:flex;flex-direction:column;height:100vh;}
.progress-bar{height:3px;background:var(--border);flex-shrink:0;}
.progress-fill{height:100%;background:var(--accent);transition:width 0.5s ease;}
.slide-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.slide{width:100%;max-width:920px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 56px;position:relative;overflow-y:auto;max-height:calc(100vh - 130px);animation:sIn 0.3s ease;}
@keyframes sIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.slide::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent);}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.stype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:3px 10px;border-radius:5px;display:inline-block;}
.t-intro{background:rgba(0,240,255,.12);color:#00f0ff;border:1px solid rgba(0,240,255,.3);}
.t-concept{background:rgba(191,95,255,.12);color:#bf5fff;border:1px solid rgba(191,95,255,.3);}
.t-activity{background:rgba(255,122,32,.12);color:#ff7a20;border:1px solid rgba(255,122,32,.3);}
.t-summary{background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.t-compete{background:rgba(241,196,15,.12);color:#f1c40f;border:1px solid rgba(241,196,15,.3);}
.snum{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
.slide h1{font-size:clamp(20px,3.5vw,34px);font-weight:700;line-height:1.15;margin-bottom:18px;}
.slide h3{font-size:16px;font-weight:700;margin:18px 0 10px;}
.sb{color:var(--text-muted);font-size:15px;line-height:1.8;}
.sb ul,.sb ol{padding-left:22px;}
.sb li{margin-bottom:7px;}
.sb li::marker{color:var(--accent);}
.sb strong{color:var(--text);}
.sb p{margin-bottom:12px;}
code{font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:5px;font-size:13px;color:var(--accent);}
pre{font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:16px 20px;border-radius:10px;font-size:13px;color:var(--accent);overflow-x:auto;margin:12px 0;line-height:1.7;}
.callout{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:14px 18px;margin:14px 0;font-size:14px;color:var(--text);}
.callout.warn{border-left-color:var(--warning);background:rgba(241,196,15,.08);}
.callout.success{border-left-color:var(--success);background:rgba(46,204,113,.08);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:14px 0;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:14px 0;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px;}
.task-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin:14px 0;}
.task-box h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text);}
.answer-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.answer-row label{font-size:13px;color:var(--text-muted);min-width:260px;flex:1 1 260px;line-height:1.5;}
.ans-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text);font-family:var(--mono);font-size:14px;width:clamp(140px,30vw,320px);text-align:left;transition:border-color .2s;}
.ans-input:focus{outline:none;border-color:var(--accent);}
.check-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.check-btn:hover{background:var(--accent);color:#000;}
.fb{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;display:none;}
.fb.ok{background:rgba(46,204,113,.15);color:var(--success);border:1px solid var(--success);display:inline-block;}
.fb.no{background:rgba(231,76,60,.15);color:var(--danger);border:1px solid var(--danger);display:inline-block;}
.compete-board{background:var(--surface2);border:2px solid var(--warning);border-radius:14px;padding:20px;margin:14px 0;}
.compete-board h4{color:var(--warning);font-size:14px;margin-bottom:14px;}
.score-display{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--warning);text-align:center;margin:10px 0;}
.timer-bar{height:8px;background:var(--border);border-radius:4px;margin:8px 0;overflow:hidden;}
.timer-fill{height:100%;background:var(--warning);border-radius:4px;transition:width 1s linear;}
.compete-input{background:var(--bg);border:2px solid var(--warning);border-radius:8px;padding:10px 16px;color:var(--text);font-family:var(--mono);font-size:20px;width:100%;text-align:center;margin:10px 0;}
.compete-input:focus{outline:none;}
.compete-btn{padding:10px 28px;border-radius:8px;border:none;background:var(--warning);color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans);width:100%;margin-top:6px;}
.compete-q{font-size:18px;font-weight:700;text-align:center;padding:14px;color:var(--text);min-height:56px;}
.leaderboard{list-style:none;margin-top:10px;}
.leaderboard li{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13px;margin-bottom:4px;background:rgba(241,196,15,.06);border:1px solid rgba(241,196,15,.15);}
.lb-pos{font-family:var(--mono);font-size:12px;color:var(--warning);width:24px;}
.lb-name{flex:1;font-weight:600;}
.lb-score{font-family:var(--mono);font-size:13px;color:var(--warning);}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface);}
.nav-btn{padding:8px 22px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;font-family:var(--sans);}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dot-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:300px;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;flex-shrink:0;}
.pdot.active{background:var(--accent);transform:scale(1.4);}
.pdot.done{background:var(--text-muted);}
.pdot.compete-dot{background:rgba(241,196,15,.4);}
.pdot.compete-dot.active{background:var(--warning);}
.sctr{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
.kbhint{font-size:11px;color:var(--text-muted);}
body.nature-green{--bg:#f4f1e8;--surface:#fff;--surface2:#ebe6d5;--border:#a8956a;--accent:#3a7a3a;--text:#1c1a0e;--text-muted:#5c5430;}
body.superpower *{font-family:'OpenDyslexic','Comic Sans MS',cursive!important;letter-spacing:.06em;word-spacing:.18em;line-height:1.9!important;}
body.superpower{--bg:#fffbea;--surface:#fff;--surface2:#f5f0dc;--border:#c8b97a;--text:#1a1200;--text-muted:#5a4e20;--accent:#1a6fd4;}
@media(max-width:640px){.slide{padding:24px 18px;}.two-col,.three-col{grid-template-columns:1fr;}.nav-btn{padding:7px 14px;font-size:12px;}}
</style>
</head>
<body>
<div class="presentation">
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="slide-area"><div class="slide" id="slide"></div></div>
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="goPrev()">&#8592; Previous</button>
    <div class="nav-center">
      <div class="dot-row" id="dots"></div>
      <div class="sctr" id="sctr">1 / 1</div>
      <div class="kbhint">&#8592; &#8594; Space &middot; &#127942; Competition on last slide</div>
    </div>
    <button class="nav-btn primary" id="next-btn" onclick="goNext()">Next &#8594;</button>
  </div>
</div>

<script>
const LESSON_ID = 'y9t6';

// ── UTILITY FUNCTIONS (must be global so onclick attributes can call them) ──
function clean(s){ return String(s).toLowerCase().replace(/[^a-z0-9]/g,''); }

function schkAny(inputId, fbId, answers) {
  var val = clean(document.getElementById(inputId).value.trim());
  var ok  = answers.map(function(a){ return clean(a); }).indexOf(val) > -1;
  var fb  = document.getElementById(fbId);
  fb.innerHTML = ok ? '&#10003; Correct!' : '&#10007; Try again &mdash; answer: ' + answers[0];
  fb.className   = 'fb ' + (ok ? 'ok' : 'no');
}

function schk(inputId, fbId, correct) {
  var val = clean(document.getElementById(inputId).value.trim());
  var ok  = val === clean(String(correct));
  var fb  = document.getElementById(fbId);
  fb.innerHTML = ok ? '&#10003; Correct!' : '&#10007; Try again &mdash; answer: ' + correct;
  fb.className   = 'fb ' + (ok ? 'ok' : 'no');
}

// ── SLIDES ──
var cur = 0;

var SLIDE_TYPES = ['intro','concept','concept','concept','concept','activity','summary','compete'];
var SLIDE_TITLES = [
  'Pseudocode \u2014 Introduction &amp; Practice',
  'Variables, Input &amp; Output',
  'Selection \u2014 IF Statements',
  'Iteration \u2014 FOR and WHILE loops',
  'Subroutines (Procedures &amp; Functions)',
  'Guided Tasks \u2014 Pseudocode',
  'Topic Summary',
  '&#127942; Pseudocode Speed Challenge'
];

var SLIDE_BODIES = [

// 0 - INTRO
'<p><strong>Pseudocode</strong> is a way of planning algorithms using structured English. It is not a real programming language \u2014 it has no strict syntax \u2014 but it follows logical patterns that mirror real code.</p>\
<div class="callout">&#128161; Pseudocode lets you focus on the <em>logic</em> of your solution without worrying about exact syntax. It is used in exam answers, planning and design.</div>\
<div class="two-col">\
<div class="card"><h4>Why use pseudocode?</h4><ul>\
<li>Language-independent \u2014 understood by all programmers</li>\
<li>Quick to write during planning</li>\
<li>Used in GCSE and A-Level exams</li>\
<li>Easier to spot logic errors before coding</li>\
</ul></div>\
<div class="card"><h4>Key features</h4><ul>\
<li>Keywords: INPUT, OUTPUT, IF, WHILE, FOR</li>\
<li>Indentation shows blocks of code</li>\
<li>No brackets needed around conditions</li>\
<li>Assignment uses &#8592; or =</li>\
</ul></div>\
</div>',

// 1 - CONCEPT: Variables
'<p>Pseudocode uses clear keywords for the most common operations:</p>\
<pre>// Assigning variables\nname &#8592; "Alice"\nage &#8592; 16\nscore &#8592; 0\n\n// Getting input from user\nINPUT name\nINPUT age\n\n// Displaying output\nOUTPUT "Hello, " + name\nOUTPUT "Your age is: " + age</pre>\
<div class="callout">The &#8592; symbol means assignment (store this value). Some exam boards use = instead.</div>\
<div class="callout warn">&#9888;&#65039; Use OUTPUT to display results \u2014 not PRINT (that is Python-specific syntax).</div>',

// 2 - CONCEPT: Selection
'<p>Selection uses IF&hellip;THEN&hellip;ELSE&hellip;ENDIF to choose between paths:</p>\
<pre>INPUT score\n\nIF score &gt;= 70 THEN\n    OUTPUT "Distinction"\nELSE IF score &gt;= 50 THEN\n    OUTPUT "Pass"\nELSE\n    OUTPUT "Fail"\nENDIF</pre>\
<div class="two-col">\
<div class="card"><h4>Comparison operators</h4><ul>\
<li><code>=</code> equal to</li>\
<li><code>!=</code> or <code>&#8800;</code> not equal</li>\
<li><code>&gt;</code> greater than</li>\
<li><code>&lt;</code> less than</li>\
<li><code>&gt;=</code> or <code>&#8805;</code> greater or equal</li>\
<li><code>&lt;=</code> or <code>&#8804;</code> less or equal</li>\
</ul></div>\
<div class="card"><h4>Logical operators</h4><ul>\
<li><code>AND</code> \u2014 both conditions must be true</li>\
<li><code>OR</code> \u2014 at least one must be true</li>\
<li><code>NOT</code> \u2014 reverses the condition</li>\
</ul></div>\
</div>',

// 3 - CONCEPT: Iteration
'<p>Two types of loop in pseudocode:</p>\
<div class="two-col">\
<div class="card"><h4>FOR loop \u2014 count-controlled</h4>\
<pre>FOR i &#8592; 1 TO 10\n    OUTPUT i\nENDFOR\n\nFOR i &#8592; 0 TO 4\n    OUTPUT i * 2\nENDFOR</pre></div>\
<div class="card"><h4>WHILE loop \u2014 condition-controlled</h4>\
<pre>count &#8592; 0\nWHILE count &lt; 5 DO\n    OUTPUT count\n    count &#8592; count + 1\nENDWHILE</pre></div>\
</div>\
<div class="callout">Use a <strong>FOR</strong> loop when you know the number of repetitions. Use <strong>WHILE</strong> when you repeat until a condition becomes false.</div>',

// 4 - CONCEPT: Subroutines
'<p>Subroutines are named, reusable blocks of code:</p>\
<div class="two-col">\
<div class="card"><h4>Procedure \u2014 no return value</h4>\
<pre>PROCEDURE greet(name)\n    OUTPUT "Hello, " + name\nENDPROCEDURE\n\n// Calling it:\ngreet("Alice")\ngreet("Bob")</pre></div>\
<div class="card"><h4>Function \u2014 returns a value</h4>\
<pre>FUNCTION square(n)\n    RETURN n * n\nENDFUNCTION\n\n// Calling it:\nresult &#8592; square(5)\nOUTPUT result  // 25</pre></div>\
</div>\
<div class="callout success">&#10003; Functions use RETURN to send a value back. Procedures perform actions but do <strong>not</strong> return values.</div>',

// 5 - ACTIVITY
'<div class="task-box"><h4>Core questions:</h4>' +
'<div class="answer-row"><label>1. What keyword is used to get data from a user?</label>' +
'<input class="ans-input" id="ps1" placeholder="...">' +
'<button class="check-btn" data-in="ps1" data-fb="fps1" data-ans="input|INPUT">Check</button>' +
'<span class="fb" id="fps1"></span></div>' +
'<div class="answer-row"><label>2. What keyword ends an IF block in pseudocode?</label>' +
'<input class="ans-input" id="ps2" placeholder="...">' +
'<button class="check-btn" data-in="ps2" data-fb="fps2" data-ans="endif|ENDIF|end if">Check</button>' +
'<span class="fb" id="fps2"></span></div>' +
'<div class="answer-row"><label>3. Which loop is best when you know the number of repetitions?</label>' +
'<input class="ans-input" id="ps3" placeholder="...">' +
'<button class="check-btn" data-in="ps3" data-fb="fps3" data-ans="for|for loop|FOR|count controlled|count-controlled">Check</button>' +
'<span class="fb" id="fps3"></span></div>' +
'<div class="answer-row"><label>4. What keyword sends a value back from a function?</label>' +
'<input class="ans-input" id="ps4" placeholder="...">' +
'<button class="check-btn" data-in="ps4" data-fb="fps4" data-ans="return|RETURN">Check</button>' +
'<span class="fb" id="fps4"></span></div>' +
'<div class="answer-row"><label>5. What keyword displays results to the user?</label>' +
'<input class="ans-input" id="ps5" placeholder="...">' +
'<button class="check-btn" data-in="ps5" data-fb="fps5" data-ans="output|OUTPUT">Check</button>' +
'<span class="fb" id="fps5"></span></div>' +
'</div>' +
'<div class="task-box"><h4>Challenge questions:</h4>' +
'<div class="answer-row"><label>6. Key difference between a procedure and a function?</label>' +
'<input class="ans-input" id="ps6" placeholder="...">' +
'<button class="check-btn" data-in="ps6" data-fb="fps6" data-ans="function returns a value|functions return values|procedure has no return value|procedures dont return values|a function returns a value">Check</button>' +
'<span class="fb" id="fps6"></span></div>' +
'<div class="answer-row"><label>7. Which loop repeats while a condition remains true?</label>' +
'<input class="ans-input" id="ps7" placeholder="...">' +
'<button class="check-btn" data-in="ps7" data-fb="fps7" data-ans="while|while loop|WHILE|condition controlled|condition-controlled">Check</button>' +
'<span class="fb" id="fps7"></span></div>' +
'<div class="answer-row"><label>8. What keyword begins a function definition in pseudocode?</label>' +
'<input class="ans-input" id="ps8" placeholder="...">' +
'<button class="check-btn" data-in="ps8" data-fb="fps8" data-ans="function|FUNCTION">Check</button>' +
'<span class="fb" id="fps8"></span></div>' +
'</div>',

// 6 - SUMMARY
'<ul>\
<li><strong>Pseudocode</strong> is a structured, language-independent way to plan algorithms</li>\
<li>Use <code>INPUT</code> to receive data, <code>OUTPUT</code> to display results</li>\
<li><code>IF&hellip;THEN&hellip;ELSE&hellip;ENDIF</code> handles selection (decisions)</li>\
<li><strong>FOR</strong> loops are count-controlled (you know how many times)</li>\
<li><strong>WHILE</strong> loops are condition-controlled (repeat until condition is false)</li>\
<li><strong>Procedures</strong> are reusable blocks that perform actions (no return value)</li>\
<li><strong>Functions</strong> are reusable blocks that <code>RETURN</code> a value</li>\
<li>Use indentation to show the structure of blocks clearly</li>\
</ul>\
<div class="callout success">&#10003; Good pseudocode is the mark of a good programmer \u2014 plan your logic before you code!</div>',

// 7 - COMPETE
'<div class="compete-board">\
<h4>&#127942; Pseudocode Speed Challenge</h4>\
<div id="comp-start-area"><p style="font-size:14px;color:var(--text-muted);margin-bottom:12px">15 seconds per question. Faster = more points!</p>\
<input class="compete-input" id="comp-name" placeholder="Your name...">\
<button class="compete-btn" onclick="startCompete()">Start Challenge &#8594;</button></div>\
<div id="comp-game-area" style="display:none">\
<div class="compete-q" id="comp-q">Loading...</div>\
<div class="timer-bar"><div class="timer-fill" id="comp-timer" style="width:100%"></div></div>\
<div class="score-display" id="comp-score">0</div>\
<input class="compete-input" id="comp-ans" placeholder="Answer..." autocomplete="off">\
<button class="compete-btn" onclick="submitCompete()">Submit &#8594;</button>\
<div class="fb" id="comp-fb"></div>\
</div>\
<div id="comp-end-area" style="display:none">\
<div class="score-display" id="comp-final">0</div>\
<p style="text-align:center;color:var(--text-muted);margin-bottom:10px">Your final score</p>\
<button class="compete-btn" onclick="showLeaderboard()">View Leaderboard</button>\
</div>\
<ul class="leaderboard" id="comp-lb"></ul>\
</div>'

];

// ── RENDER ──
function render() {
  var s = SLIDE_TYPES[cur];
  var typeLabel = s;
  var html = '<div class="eyebrow">'
    + '<span class="stype t-' + typeLabel + '">' + typeLabel + '</span>'
    + '<span class="snum">' + (cur+1) + ' / ' + SLIDE_TYPES.length + '</span>'
    + '</div>'
    + '<h1>' + SLIDE_TITLES[cur] + '</h1>'
    + '<div class="sb">' + SLIDE_BODIES[cur] + '</div>';
  document.getElementById('slide').innerHTML = html;
  document.getElementById('prog').style.width = (((cur+1)/SLIDE_TYPES.length)*100) + '%';
  document.getElementById('sctr').textContent = (cur+1) + ' / ' + SLIDE_TYPES.length;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === SLIDE_TYPES.length-1;
  var dotsHtml = '';
  for (var i=0; i<SLIDE_TYPES.length; i++) {
    var cls = 'pdot';
    if (SLIDE_TYPES[i]==='compete') cls += ' compete-dot';
    if (i===cur) cls += ' active';
    else if (i<cur) cls += ' done';
    dotsHtml += '<div class="' + cls + '" onclick="goTo(' + i + ')"></div>';
  }
  document.getElementById('dots').innerHTML = dotsHtml;
  if (s === 'compete') {
    var lb = JSON.parse(localStorage.getItem('ks3_lb_' + LESSON_ID) || '[]');
    renderLeaderboard(lb);
  }
}

function goNext() { if (cur < SLIDE_TYPES.length-1) { cur++; render(); } }
function goPrev() { if (cur > 0) { cur--; render(); } }
function goTo(i)  { cur = i; render(); }

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight' || e.key===' ') { e.preventDefault(); goNext(); }
  if (e.key==='ArrowLeft')                  { e.preventDefault(); goPrev(); }
});

// ── SPEED CHALLENGE ──
var CQ = [
  { q:'What keyword gets input from a user?',            answers:['input','INPUT'] },
  { q:'What keyword ends an IF block?',                  answers:['endif','ENDIF','end if'] },
  { q:'What loop is count-controlled?',                  answers:['for','FOR','for loop'] },
  { q:'What loop is condition-controlled?',              answers:['while','WHILE','while loop'] },
  { q:'What keyword returns a value from a function?',   answers:['return','RETURN'] },
  { q:'What does a function have that a procedure does not?', answers:['return value','a return value','return statement'] },
  { q:'What keyword displays output to the user?',       answers:['output','OUTPUT'] },
  { q:'What keyword starts a function definition?',      answers:['function','FUNCTION'] },
  { q:'What keyword starts a procedure definition?',     answers:['procedure','PROCEDURE'] },
  { q:'Which loop do you use when you know how many repetitions?', answers:['for','FOR','for loop','count controlled'] },
];

var compIdx=0, compScore=0, compTimer=null, compName='', compRunning=false;

function startCompete() {
  compName = document.getElementById('comp-name').value.trim() || 'Anonymous';
  compScore=0; compIdx=0; compRunning=true;
  document.getElementById('comp-start-area').style.display='none';
  document.getElementById('comp-game-area').style.display='block';
  nextCompQ();
}

function nextCompQ() {
  if (compIdx >= CQ.length) { endCompete(); return; }
  var q = CQ[compIdx];
  document.getElementById('comp-q').textContent = q.q;
  document.getElementById('comp-ans').value = '';
  document.getElementById('comp-fb').className = 'fb';
  document.getElementById('comp-ans').focus();
  var t = 15;
  var timerEl = document.getElementById('comp-timer');
  timerEl.style.transition = 'none';
  timerEl.style.width = '100%';
  setTimeout(function() {
    timerEl.style.transition = 'width 1s linear';
    timerEl.style.width = '0%';
  }, 50);
  clearInterval(compTimer);
  compTimer = setInterval(function() {
    t--;
    if (t <= 0) { clearInterval(compTimer); autoNext(); }
  }, 1000);
}

function autoNext() {
  if (!compRunning) return;
  var fb = document.getElementById('comp-fb');
  fb.innerHTML = '&#9201; Time up! Answer: ' + CQ[compIdx].answers[0];
  fb.className = 'fb no';
  compIdx++;
  setTimeout(nextCompQ, 1200);
}

function submitCompete() {
  if (!compRunning) return;
  clearInterval(compTimer);
  var ans = clean(document.getElementById('comp-ans').value.trim());
  var q   = CQ[compIdx];
  var ok  = q.answers.map(function(a){ return clean(a); }).indexOf(ans) > -1;
  var fb  = document.getElementById('comp-fb');
  var pct = parseFloat(document.getElementById('comp-timer').style.width) || 0;
  var bonus = ok ? Math.ceil(pct/10) + 10 : 0;
  if (ok) {
    compScore += bonus;
    document.getElementById('comp-score').textContent = compScore;
    fb.innerHTML = '&#10003; +' + bonus + ' pts';
    fb.className = 'fb ok';
  } else {
    fb.innerHTML = '&#10007; Answer: ' + q.answers[0];
    fb.className = 'fb no';
  }
  compIdx++;
  setTimeout(nextCompQ, 1000);
}

document.addEventListener('keydown', function(e) {
  var ansEl = document.getElementById('comp-ans');
  if (e.key==='Enter' && compRunning && ansEl && document.activeElement===ansEl) submitCompete();
});

function endCompete() {
  compRunning = false;
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display  = 'block';
  document.getElementById('comp-final').textContent = compScore;
  var lb = JSON.parse(localStorage.getItem('ks3_lb_' + LESSON_ID) || '[]');
  lb.push({ name: compName, score: compScore, ts: Date.now() });
  lb.sort(function(a,b){ return b.score - a.score; });
  localStorage.setItem('ks3_lb_' + LESSON_ID, JSON.stringify(lb.slice(0,10)));
  renderLeaderboard(lb);
}

function showLeaderboard() {
  var lb = JSON.parse(localStorage.getItem('ks3_lb_' + LESSON_ID) || '[]');
  renderLeaderboard(lb);
}

function renderLeaderboard(lb) {
  var el = document.getElementById('comp-lb');
  if (!el) return;
  el.innerHTML = lb.slice(0,10).map(function(e,i) {
    return '<li><span class="lb-pos">' + (i+1) + '</span>'
         + '<span class="lb-name">' + e.name + '</span>'
         + '<span class="lb-score">' + e.score + 'pts</span></li>';
  }).join('');
}


// ── EVENT DELEGATION for check buttons (avoids inline onclick quote issues) ──
document.addEventListener('click', function(e) {
  var btn = e.target;
  if (!btn.classList.contains('check-btn')) return;
  var inputId = btn.getAttribute('data-in');
  var fbId    = btn.getAttribute('data-fb');
  var ansStr  = btn.getAttribute('data-ans');
  if (!inputId || !fbId || !ansStr) return;
  var answers = ansStr.split('|');
  schkAny(inputId, fbId, answers);
});

render();
</script>
