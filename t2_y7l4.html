<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y7 — Introduction to Programming</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#0f1117;--surface:#1a1d2e;--surface2:#22263a;--border:#353a5c;
  --accent:#00f0ff;--text:#f0f0ff;--text-muted:#9090c0;
  --success:#2ecc71;--warning:#f1c40f;--danger:#e74c3c;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}
.presentation{display:flex;flex-direction:column;height:100vh;}
.progress-bar{height:3px;background:var(--border);flex-shrink:0;position:relative;}
.progress-fill{height:100%;background:var(--accent);transition:width 0.5s ease;}
.slide-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.slide{
  width:100%;max-width:920px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:48px 56px;position:relative;overflow-y:auto;
  max-height:calc(100vh - 130px);animation:sIn 0.3s ease;
}
@keyframes sIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.slide::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent);}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.stype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:3px 10px;border-radius:5px;display:inline-block;}
.t-intro   {background:rgba(0,240,255,.12);color:#00f0ff;border:1px solid rgba(0,240,255,.3);}
.t-concept {background:rgba(191,95,255,.12);color:#bf5fff;border:1px solid rgba(191,95,255,.3);}
.t-activity{background:rgba(255,122,32,.12);color:#ff7a20;border:1px solid rgba(255,122,32,.3);}
.t-summary {background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.t-compete {background:rgba(241,196,15,.12);color:#f1c40f;border:1px solid rgba(241,196,15,.3);}
.snum{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
.slide h1{font-size:clamp(20px,3.5vw,34px);font-weight:700;line-height:1.15;margin-bottom:18px;}
.slide h3{font-size:16px;font-weight:700;margin:18px 0 10px;}
.sb{color:var(--text-muted);font-size:15px;line-height:1.8;}
.sb ul,.sb ol{padding-left:22px;}
.sb li{margin-bottom:7px;}
.sb li::marker{color:var(--accent);}
.sb strong{color:var(--text);}
.sb p{margin-bottom:12px;}
.sb p:last-child{margin-bottom:0;}
code{font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:5px;font-size:13px;color:var(--accent);}
pre{font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:16px 20px;border-radius:10px;font-size:13px;color:var(--accent);overflow-x:auto;margin:12px 0;line-height:1.7;}
.callout{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:14px 18px;margin:14px 0;font-size:14px;color:var(--text);}
.callout.warn{border-left-color:var(--warning);background:rgba(241,196,15,.08);}
.callout.success{border-left-color:var(--success);background:rgba(46,204,113,.08);}
.callout.compete{border-left-color:var(--warning);background:rgba(241,196,15,.06);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:14px 0;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:14px 0;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px;}
/* Binary table */
.bit-table{width:100%;border-collapse:collapse;margin:14px 0;font-family:var(--mono);}
.bit-table th{background:var(--surface2);padding:10px 14px;border:1px solid var(--border);text-align:center;font-size:13px;color:var(--accent);}
.bit-table td{padding:10px 14px;border:1px solid var(--border);text-align:center;font-size:14px;}
.bit-table tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.bit-highlight{background:rgba(0,240,255,.15)!important;color:var(--accent);font-weight:700;}
/* Task interactive */
.task-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin:14px 0;}
.task-box h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text);}
.answer-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.answer-row label{font-size:13px;color:var(--muted);min-width:260px;flex:1 1 260px;line-height:1.5;}
.ans-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text);font-family:var(--mono);font-size:14px;width:clamp(140px,30vw,320px);text-align:left;transition:border-color .2s;}
.ans-input:focus{outline:none;border-color:var(--accent);}
.check-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.check-btn:hover{background:var(--accent);color:#000;}
.fb{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;display:none;}
.fb.ok{background:rgba(46,204,113,.15);color:var(--success);border:1px solid var(--success);display:inline-block;}
.fb.no{background:rgba(231,76,60,.15);color:var(--danger);border:1px solid var(--danger);display:inline-block;}
/* Compete */
.compete-board{background:var(--surface2);border:2px solid var(--warning);border-radius:14px;padding:20px;margin:14px 0;}
.compete-board h4{color:var(--warning);font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.score-display{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--warning);text-align:center;margin:10px 0;}
.timer-bar{height:8px;background:var(--border);border-radius:4px;margin:8px 0;overflow:hidden;}
.timer-fill{height:100%;background:var(--warning);border-radius:4px;transition:width 1s linear;}
.compete-input{background:var(--bg);border:2px solid var(--warning);border-radius:8px;padding:10px 16px;color:var(--text);font-family:var(--mono);font-size:20px;width:100%;text-align:center;margin:10px 0;}
.compete-input:focus{outline:none;}
.compete-btn{padding:10px 28px;border-radius:8px;border:none;background:var(--warning);color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans);width:100%;margin-top:6px;}
.compete-q{font-size:18px;font-weight:700;text-align:center;padding:14px;color:var(--text);min-height:56px;}
.leaderboard{list-style:none;margin-top:10px;}
.leaderboard li{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13px;margin-bottom:4px;background:rgba(241,196,15,.06);border:1px solid rgba(241,196,15,.15);}
.lb-pos{font-family:var(--mono);font-size:12px;color:var(--warning);width:24px;}
.lb-name{flex:1;font-weight:600;}
.lb-score{font-family:var(--mono);font-size:13px;color:var(--warning);}
/* Nav */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface);}
.nav-btn{padding:8px 22px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;font-family:var(--sans);}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dot-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:300px;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;flex-shrink:0;}
.pdot.active{background:var(--accent);transform:scale(1.4);}
.pdot.done{background:var(--text-muted);}
.pdot.compete-dot{background:rgba(241,196,15,.4);}
.pdot.compete-dot.active{background:var(--warning);}
.sctr{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
.kbhint{font-size:11px;color:var(--text-muted);}
/* Filters */
body.nature-green{--bg:#f4f1e8;--surface:#fff;--surface2:#ebe6d5;--border:#a8956a;--accent:#3a7a3a;--text:#1c1a0e;--text-muted:#5c5430;}
body.nature-green .callout{background:#e8f5e0!important;border-left-color:#3a7a3a!important;}
body.nature-green code,body.nature-green pre{background:#e8f5e0!important;color:#1c3a1c!important;border-color:#a8c8a8!important;}
body.superpower *{font-family:'OpenDyslexic','Comic Sans MS',cursive!important;letter-spacing:.06em;word-spacing:.18em;line-height:1.9!important;}
body.superpower{--bg:#fffbea;--surface:#fff;--surface2:#f5f0dc;--border:#c8b97a;--text:#1a1200;--text-muted:#5a4e20;--accent:#1a6fd4;}
@media(max-width:640px){.slide{padding:24px 18px;}.two-col,.three-col{grid-template-columns:1fr;}.nav-btn{padding:7px 14px;font-size:12px;}}
</style>
</head>
<body>
<div class="presentation">
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="slide-area"><div class="slide" id="slide"></div></div>
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="goPrev()">← Previous</button>
    <div class="nav-center">
      <div class="dot-row" id="dots"></div>
      <div class="sctr" id="sctr">1 / 1</div>
      <div class="kbhint">← → Space · 🏆 Competition on last slide</div>
    </div>
    <button class="nav-btn primary" id="next-btn" onclick="goNext()">Next →</button>
  </div>
</div>
<script>
const LESSON_ID = `y7t4`;
const SLIDES = [
  { type:`intro`, title:`What is Programming?`, body:`<p>Programming is writing instructions that a computer can follow to solve a problem or complete a task. Every app, game and website is built from code.</p>
<div class="two-col"><div class="card"><h4>Why Python?</h4><p>Python is one of the world's most popular languages. It reads almost like English, making it perfect for beginners — and it is used by Google, NASA and Netflix.</p></div>
<div class="card"><h4>What is a Program?</h4><p>A sequence of instructions written in a programming language. The computer executes them one by one, top to bottom (unless told otherwise).</p></div></div>
<div class="callout">🎯 Goals today: variables, data types, input/output, and writing your first Python programs.</div>` },
  { type:`concept`, title:`Variables & Data Types`, body:`<p>A <strong>variable</strong> is a named box in memory that stores a value your program can use and change.</p>
<pre>name = "Alice"     # String — text in quotes
age  = 14          # Integer — whole number
score = 9.5        # Float — decimal number
passed = True      # Boolean — True or False</pre>
<table class="bit-table"><tr><th>Type</th><th>Example</th><th>Used for</th></tr>
<tr><td><strong>String</strong></td><td><code>"Hello"</code></td><td>Text, names, messages</td></tr>
<tr><td><strong>Integer</strong></td><td><code>42</code></td><td>Whole numbers, counts</td></tr>
<tr><td><strong>Float</strong></td><td><code>3.14</code></td><td>Decimals, measurements</td></tr>
<tr><td><strong>Boolean</strong></td><td><code>True</code></td><td>Yes/No decisions</td></tr></table>
<div class="callout warn">⚠️ Python is case-sensitive: <code>Name</code> and <code>name</code> are different variables!</div>` },
  { type:`concept`, title:`Input & Output`, body:`<p>Programs communicate with users via <strong>input</strong> (reading) and <strong>output</strong> (displaying):</p>
<pre># OUTPUT — display to screen
print("Hello, World!")
print("Your score is:", score)

# INPUT — read from keyboard
name = input("What is your name? ")
age  = int(input("How old are you? "))</pre>
<div class="callout warn">⚠️ <code>input()</code> always returns a <strong>string</strong>. To use it as a number, convert it:<br><code>age = int(input("Age: "))</code> or <code>price = float(input("Price: "))</code></div>
<div class="card" style="margin-top:14px"><h4>String Concatenation</h4>
<pre>name = "Alex"
print("Hello, " + name + "!")  # Hello, Alex!</pre></div>` },
  { type:`concept`, title:`Selection — IF Statements`, body:`<p><strong>Selection</strong> lets your program make decisions and follow different paths:</p>
<pre>score = int(input("Enter your score: "))

if score >= 70:
    print("Distinction!")
elif score >= 50:
    print("Pass")
else:
    print("Try again")

print("Program finished")</pre>
<div class="two-col"><div class="card"><h4>Comparison Operators</h4><p><code>==</code> equal to<br><code>!=</code> not equal<br><code>&gt;</code> greater than<br><code>&lt;</code> less than<br><code>&gt;=</code> greater or equal<br><code>&lt;=</code> less or equal</p></div>
<div class="card"><h4>Key Rules</h4><p>• Colon <code>:</code> after every condition<br>• Indent with 4 spaces inside blocks<br>• <code>elif</code> = else if<br>• Only ONE branch runs</p></div></div>` },
  { type:`concept`, title:`Iteration — Loops`, body:`<p><strong>Iteration</strong> repeats a block of code. Python has two main loop types:</p>
<div class="two-col"><div class="card"><h4>FOR Loop — count controlled</h4>
<pre>for i in range(5):
    print(i)
# Prints: 0 1 2 3 4

for i in range(1, 6):
    print(i)
# Prints: 1 2 3 4 5</pre></div>
<div class="card"><h4>WHILE Loop — condition controlled</h4>
<pre>count = 0
while count < 5:
    print(count)
    count = count + 1
# Prints: 0 1 2 3 4</pre></div></div>
<div class="callout">🔑 Use <strong>FOR</strong> when you know how many times. Use <strong>WHILE</strong> when you repeat until something happens.</div>` },
  { type:`activity`, title:`Guided Tasks — Python Basics`, body:`<p>Answer each question about Python programming.</p>
<div class="task-box"><h4>📝 Task A — Variables & Types</h4>
<div class="answer-row"><label>1. What data type is <code>"Hello"</code>?</label><input class="ans-input" id="p1" placeholder="..."><button class="check-btn" onclick="schkAny('p1','fp1',['string','String'])">Check</button><span class="fb" id="fp1"></span></div>
<div class="answer-row"><label>2. What data type is <code>42</code>?</label><input class="ans-input" id="p2" placeholder="..."><button class="check-btn" onclick="schkAny('p2','fp2',['integer','Integer','int'])">Check</button><span class="fb" id="fp2"></span></div>
<div class="answer-row"><label>3. What does <code>input()</code> always return?</label><input class="ans-input" id="p3" placeholder="..."><button class="check-btn" onclick="schkAny('p3','fp3',['string','String','a string'])">Check</button><span class="fb" id="fp3"></span></div>
<div class="answer-row"><label>4. What symbol checks equality in Python?</label><input class="ans-input" id="p4" placeholder="..."><button class="check-btn" onclick="schk('p4','fp4','==')">Check</button><span class="fb" id="fp4"></span></div>
</div>
<div class="task-box"><h4>📝 Task B — Reading Code</h4>
<p style="font-size:13px;color:var(--muted);margin-bottom:10px">What does this code print?<br><code>x = 10<br>if x > 5:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("Big")<br>else:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("Small")</code></p>
<div class="answer-row"><label>5. What is printed?</label><input class="ans-input" id="p5" placeholder="..."><button class="check-btn" onclick="schkAny('p5','fp5',['big','Big','"big"'])">Check</button><span class="fb" id="fp5"></span></div>
<div class="answer-row"><label>6. How many times does <code>for i in range(4):</code> loop?</label><input class="ans-input" id="p6" placeholder="..."><button class="check-btn" onclick="schk('p6','fp6','4')">Check</button><span class="fb" id="fp6"></span></div>
<div class="answer-row"><label>7. Which loop is best when you don't know how many repeats?</label><input class="ans-input" id="p7" placeholder="..."><button class="check-btn" onclick="schkAny('p7','fp7',['while','while loop','WHILE','a while loop'])">Check</button><span class="fb" id="fp7"></span></div>
</div>` },
  { type:`summary`, title:`Topic Summary`, body:`<ul>
<li>A <strong>variable</strong> stores a value: String, Integer, Float, or Boolean</li>
<li><code>print()</code> outputs to screen; <code>input()</code> reads from keyboard (always returns a string)</li>
<li>Convert input to numbers: <code>int(input(...))</code> or <code>float(input(...))</code></li>
<li><strong>Selection</strong>: <code>if / elif / else</code> — always end condition with <code>:</code>, indent body 4 spaces</li>
<li><strong>FOR loop</strong>: count-controlled, use <code>range()</code></li>
<li><strong>WHILE loop</strong>: condition-controlled, repeats until condition is False</li>
</ul><div class="callout success">✅ Next: Spreadsheet Modelling</div>` },
  { type:`compete`, title:`🏆 Python Speed Challenge`, body:`<div class="compete-board"><h4>🏆 Python Speed Challenge</h4>
<div id="comp-start-area"><p style="font-size:14px;color:var(--muted);margin-bottom:12px">15 seconds per question!</p>
<input class="compete-input" id="comp-name" placeholder="Your name...">
<button class="compete-btn" onclick="startComp()">🚀 Start!</button>
<ul class="leaderboard" id="leaderboard"></ul></div>
<div id="comp-game-area" style="display:none">
<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px"><span id="comp-qnum"></span><span id="comp-timeleft" style="color:var(--warning)"></span></div>
<div class="timer-bar"><div class="timer-fill" id="comp-timer-fill"></div></div>
<div class="compete-q" id="comp-q"></div>
<input class="compete-input" id="comp-ans" placeholder="Answer..." autocomplete="off">
<button class="compete-btn" onclick="submitCompAns()">Submit ↵</button>
<div style="display:flex;justify-content:space-between;margin-top:8px"><span style="font-size:13px;color:var(--muted)">Score: <strong style="color:var(--warning);font-family:var(--mono)" id="comp-score">0</strong></span><span id="comp-feedback" style="font-size:13px;font-weight:700"></span></div>
</div>
<div id="comp-end-area" style="display:none;text-align:center">
<div style="font-size:40px">🎉</div><p style="font-size:18px;font-weight:700">Well done, <span id="comp-final-name"></span>!</p>
<div class="score-display" id="comp-final-score">0</div>
<button class="compete-btn" onclick="resetComp()">🔄 Play Again</button>
<ul class="leaderboard" id="leaderboard"></ul></div></div>` },
];

const COMP_Qs = [
  { q:`What Python function displays output to the screen?`, answers:[`print`,`print()`] },
  { q:`What data type stores text in Python?`, answers:[`string`,`String`] },
  { q:`What does int() do to an input value?`, answers:[`converts it to an integer`,`converts to integer`,`makes it a number`] },
  { q:`What symbol is used for equality comparison in Python?`, answers:[`==`] },
  { q:`How many times does range(5) loop?`, answers:[`5`] },
  { q:`Which loop repeats while a condition is True?`, answers:[`while`,`while loop`,`WHILE`] },
  { q:`What must you put at the end of an if statement line?`, answers:[`colon`,`:`] },
  { q:`What data type is True or False?`, answers:[`boolean`,`Boolean`] },
  { q:`What is the correct indentation in Python?`, answers:[`4 spaces`,`4`] },
  { q:`Which loop uses range()?`, answers:[`for`,`for loop`,`FOR`] },
  { q:`What does print("Hi" + " " + "Joe") output?`, answers:[`Hi Joe`] },
  { q:`What keyword follows if to add another condition?`, answers:[`elif`] },
];

// ── RENDER ──────────────────────────────────────────────────
let cur = 0;
function render() {
  const s = SLIDES[cur], total = SLIDES.length;
  const typeLabel = s.type === 'compete' ? 'Competition' : s.type.charAt(0).toUpperCase() + s.type.slice(1);
  document.getElementById('slide').innerHTML =
    '<div class="eyebrow">' +
      '<span class="stype t-' + s.type + '">' + typeLabel + '</span>' +
      '<span class="snum">Slide ' + (cur+1) + ' of ' + total + '</span>' +
    '</div>' +
    '<h1>' + s.title + '</h1>' +
    '<div class="sb">' + (s.body || '') + '</div>';
  if (s.onRender) setTimeout(s.onRender, 80);
  document.getElementById('prog').style.width = ((cur+1)/total*100) + '%';
  document.getElementById('sctr').textContent = (cur+1) + ' / ' + total;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === total - 1;
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  SLIDES.forEach((sl, i) => {
    const d = document.createElement('div');
    const isCompete = sl.type === 'compete';
    d.className = 'pdot' + (isCompete ? ' compete-dot' : '') + (i===cur?' active':i<cur?' done':'');
    d.onclick = () => { cur=i; render(); };
    d.title = sl.title;
    dots.appendChild(d);
  });
}
function goNext() { if (cur < SLIDES.length-1) { cur++; render(); } }
function goPrev() { if (cur > 0) { cur--; render(); } }
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
});
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'filter') {
    document.body.classList.remove('nature-green','superpower');
    if (e.data.filter) document.body.classList.add(e.data.filter);
  }
});

// ── TASK CHECK HELPER ────────────────────────────────────────
function chk(inputId, fbId, correct) {
  const val = document.getElementById(inputId).value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  correct = String(correct).toLowerCase().replace(/[^a-z0-9]/g,'');
  const ans = String(correct).toLowerCase().replace(/\s+/g,'');
  const ok  = val === ans;
  const fb  = document.getElementById(fbId);
  fb.className = 'fb ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? '✓ Correct!' : '✗ Try again — answer: ' + correct;
}
function chkAny(inputId, fbId, answers) {
  const clean = s => String(s).toLowerCase().replace(/[^a-z0-9]/g,'');
  const val = clean(document.getElementById(inputId).value.trim());
  const ok  = answers.map(a=>clean(a)).includes(val);
  const fb  = document.getElementById(fbId);
  fb.className = 'fb ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? '✓ Correct!' : '✗ Try again — answer: ' + answers[0];
}

// ── COMPETITION ENGINE ───────────────────────────────────────
let compState = { score:0, qIdx:0, timer:null, timeLeft:15, active:false, name:'' };

function startComp() {
  const nameEl = document.getElementById('comp-name');
  if (!nameEl || !nameEl.value.trim()) { alert('Enter your name first!'); return; }
  compState.name = nameEl.value.trim();
  compState.score = 0;
  compState.qIdx = 0;
  compState.active = true;
  document.getElementById('comp-start-area').style.display = 'none';
  document.getElementById('comp-game-area').style.display = 'block';
  document.getElementById('comp-end-area').style.display = 'none';
  nextCompQ();
}

function nextCompQ() {
  if (compState.qIdx >= COMP_Qs.length) { endComp(); return; }
  clearInterval(compState.timer);
  compState.timeLeft = 15;
  const q = COMP_Qs[compState.qIdx];
  document.getElementById('comp-q').textContent = q.q;
  document.getElementById('comp-ans').value = '';
  document.getElementById('comp-ans').focus();
  document.getElementById('comp-score').textContent = compState.score;
  document.getElementById('comp-qnum').textContent = (compState.qIdx+1) + ' / ' + COMP_Qs.length;
  document.getElementById('comp-feedback').textContent = '';
  updateTimer();
  compState.timer = setInterval(() => {
    compState.timeLeft--;
    updateTimer();
    if (compState.timeLeft <= 0) { clearInterval(compState.timer); autoWrong(); }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById('comp-timer-fill');
  const pct = (compState.timeLeft / 15) * 100;
  if (el) el.style.width = pct + '%';
  const tlEl = document.getElementById('comp-timeleft');
  if (tlEl) tlEl.textContent = compState.timeLeft + 's';
}

function submitCompAns() {
  if (!compState.active) return;
  clearInterval(compState.timer);
  const ans = document.getElementById('comp-ans').value.trim().toLowerCase().replace(/\s+/g,'');
  const q   = COMP_Qs[compState.qIdx];
  const ok  = q.answers.map(a=>String(a).toLowerCase().replace(/\s+/g,'')).includes(ans);
  const fb  = document.getElementById('comp-feedback');
  if (ok) {
    const pts = Math.max(1, compState.timeLeft);
    compState.score += pts;
    fb.style.color = 'var(--success)';
    fb.textContent = '✓ Correct! +' + pts + ' points';
  } else {
    fb.style.color = 'var(--danger)';
    fb.textContent = '✗ Answer: ' + q.answers[0];
  }
  compState.qIdx++;
  setTimeout(nextCompQ, 1200);
}

function autoWrong() {
  const q  = COMP_Qs[compState.qIdx];
  const fb = document.getElementById('comp-feedback');
  fb.style.color = 'var(--danger)';
  fb.textContent = '⏱ Time up! Answer: ' + q.answers[0];
  compState.qIdx++;
  setTimeout(nextCompQ, 1400);
}

function endComp() {
  compState.active = false;
  clearInterval(compState.timer);
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display = 'block';
  document.getElementById('comp-final-score').textContent = compState.score;
  document.getElementById('comp-final-name').textContent = compState.name;
  // Save to leaderboard
  const lb = JSON.parse(localStorage.getItem('ks3_lb_' + LESSON_ID) || '[]');
  lb.push({ name: compState.name, score: compState.score, date: new Date().toLocaleDateString() });
  lb.sort((a,b) => b.score - a.score);
  const top10 = lb.slice(0,10);
  localStorage.setItem('ks3_lb_' + LESSON_ID, JSON.stringify(top10));
  renderLeaderboard(top10);
}

function renderLeaderboard(lb) {
  const el = document.getElementById('leaderboard');
  if (!el) return;
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = lb.length === 0
    ? '<li style="color:var(--text-muted);font-size:13px">No scores yet — be the first!</li>'
    : lb.map((e,i) => '<li><span class="lb-pos">' + (medals[i]||'#'+(i+1)) + '</span><span class="lb-name">' + e.name + '</span><span class="lb-score">' + e.score + ' pts</span></li>').join('');
}

function resetComp() {
  document.getElementById('comp-start-area').style.display = 'block';
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display = 'none';
  compState = { score:0, qIdx:0, timer:null, timeLeft:15, active:false, name:'' };
}

document.addEventListener('keydown', e => {
  if (e.target.id === 'comp-ans' && e.key === 'Enter') { e.preventDefault(); submitCompAns(); }
});
render();


</script>
