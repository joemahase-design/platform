<script>
const LESSON_ID = `y9t2`;
const SLIDES = [
  { type:`intro`, title:`Why Study Algorithms?`, body:`<p>Algorithms are step-by-step solutions to problems. <strong>Searching</strong> and <strong>sorting</strong> are the most fundamental algorithms in computer science — they underpin nearly every application.</p>
<div class="two-col">
<div class="card"><h4>Real Uses</h4><ul><li>Search engines finding web pages</li><li>Databases looking up records</li><li>Spreadsheets sorting data</li><li>Games pathfinding</li></ul></div>
<div class="card"><h4>Why Efficiency Matters</h4><p>With millions of records, a slow algorithm takes hours. An efficient one takes milliseconds. We measure efficiency with <strong>Big O notation</strong>.</p></div></div>
<div class="callout">🎯 Today: linear search, binary search, bubble sort, merge sort — and how to compare their efficiency.</div>` },
  { type:`concept`, title:`Linear Search`, body:`<p><strong>Linear search</strong> checks each item one by one from start to finish:</p>
<pre>def linear_search(data, target):
    for i in range(len(data)):
        if data[i] == target:
            return i        # found at index i
    return -1               # not found

scores = [45, 82, 17, 63, 91, 28]
print(linear_search(scores, 63))  # Returns 3</pre>
<div class="two-col">
<div class="card"><h4>✅ Advantages</h4><ul><li>Works on unsorted data</li><li>Simple to implement</li><li>Good for small lists</li></ul></div>
<div class="card"><h4>❌ Disadvantages</h4><ul><li>Slow on large lists</li><li>Worst case: checks every item</li><li>O(n) — linear time</li></ul></div></div>` },
  { type:`concept`, title:`Binary Search`, body:`<p><strong>Binary search</strong> works on <em>sorted</em> data — repeatedly halves the search space:</p>
<pre>def binary_search(data, target):
    low, high = 0, len(data) - 1
    while low <= high:
        mid = (low + high) // 2
        if data[mid] == target:
            return mid
        elif data[mid] < target:
            low = mid + 1     # search right half
        else:
            high = mid - 1    # search left half
    return -1

sorted_list = [10, 23, 35, 47, 58, 69, 74]
print(binary_search(sorted_list, 47))  # Returns 3</pre>
<div class="callout success">✅ Binary search on 1 million items takes at most 20 comparisons. Linear search could take 1,000,000!</div>` },
  { type:`concept`, title:`Bubble Sort`, body:`<p><strong>Bubble sort</strong> repeatedly swaps adjacent items that are in the wrong order, until the list is sorted:</p>
<pre>def bubble_sort(data):
    n = len(data)
    for i in range(n):
        for j in range(0, n-i-1):
            if data[j] > data[j+1]:
                data[j], data[j+1] = data[j+1], data[j]
    return data

nums = [64, 34, 25, 12, 22, 11, 90]
print(bubble_sort(nums))
# [11, 12, 22, 25, 34, 64, 90]</pre>
<div class="two-col">
<div class="card"><h4>Trace: [5, 3, 8, 1]</h4><p>Pass 1: [3,5,8,1] → [3,5,8,1] → [3,5,1,8]<br>Pass 2: [3,5,1,8] → [3,1,5,8]<br>Pass 3: [1,3,5,8] ✓</p></div>
<div class="card"><h4>Efficiency</h4><p>O(n²) — quadratic time. Fine for small lists. Very slow for large datasets. Simple to understand and implement.</p></div></div>` },
  { type:`concept`, title:`Merge Sort`, body:`<p><strong>Merge sort</strong> uses divide and conquer — splits the list in half recursively, then merges sorted halves:</p>
<pre>def merge_sort(data):
    if len(data) <= 1:
        return data
    mid   = len(data) // 2
    left  = merge_sort(data[:mid])
    right = merge_sort(data[mid:])
    return merge(left, right)

def merge(left, right):
    result = []
    i = j  = 0
    while i < len(left) and j < len(right):
        if left[i] <= right[j]:
            result.append(left[i]); i += 1
        else:
            result.append(right[j]); j += 1
    result += left[i:] + right[j:]
    return result</pre>
<div class="callout success">✅ Merge sort: O(n log n) — much faster than bubble sort on large data. Used in Python's own <code>sorted()</code> function.</div>` },
  { type:`activity`, title:`Guided Tasks — Algorithms`, body:`<p>Test your searching and sorting knowledge.</p>
<div class="task-box"><h4>📝 Task A — Search Algorithms</h4>
<div class="answer-row"><label>1. Which search requires sorted data?</label><input class="ans-input" id="al1" placeholder="..."><button class="check-btn" onclick="schkAny('al1','fal1',['binary search','binary','Binary Search'])">Check</button><span class="fb" id="fal1"></span></div>
<div class="answer-row"><label>2. What is the worst case complexity of linear search?</label><input class="ans-input" id="al2" placeholder="..."><button class="check-btn" onclick="schkAny('al2','fal2',['o(n)','O(n)','linear','o n','linear time','n'])">Check</button><span class="fb" id="fal2"></span></div>
<div class="answer-row"><label>3. Binary search on 1024 items — max comparisons?</label><input class="ans-input" id="al3" placeholder="..."><button class="check-btn" onclick="schk('al3','fal3','10')">Check</button><span class="fb" id="fal3"></span></div>
</div>
<div class="task-box"><h4>📝 Task B — Sorting</h4>
<div class="answer-row"><label>4. What is the time complexity of bubble sort?</label><input class="ans-input" id="al4" placeholder="..."><button class="check-btn" onclick="schkAny('al4','fal4',['o(n2)','O(n²)','o(n^2)','quadratic','on2','on squared','o(n squared)','n squared','n2'])">Check</button><span class="fb" id="fal4"></span></div>
<div class="answer-row"><label>5. What strategy does merge sort use?</label><input class="ans-input" id="al5" placeholder="..."><button class="check-btn" onclick="schkAny('al5','fal5',['divide and conquer','divide & conquer','divideandconquer','split and merge','splitting'])">Check</button><span class="fb" id="fal5"></span></div>
<div class="answer-row"><label>6. Which sort is more efficient on large data — bubble or merge?</label><input class="ans-input" id="al6" placeholder="..."><button class="check-btn" onclick="schkAny('al6','fal6',['merge','merge sort','Merge Sort'])">Check</button><span class="fb" id="fal6"></span></div>
</div>` },
  { type:`summary`, title:`Topic Summary`, body:`<ul>
<li><strong>Linear search</strong>: checks each item — O(n), works on unsorted data</li>
<li><strong>Binary search</strong>: halves search space each step — O(log n), requires sorted data</li>
<li><strong>Bubble sort</strong>: swaps adjacent pairs — O(n²), simple but slow on large data</li>
<li><strong>Merge sort</strong>: divide and conquer — O(n log n), much faster for large datasets</li>
<li>Big O notation describes worst-case time complexity as data grows</li>
</ul><div class="callout success">✅ Next: AI &amp; Machine Learning Ethics</div>` },
  { type:`compete`, title:`🏆 Algorithms Speed Challenge`, body:`<div class="compete-board"><h4>🏆 Searching & Sorting Speed Round</h4>
<div id="comp-start-area"><p style="font-size:14px;color:var(--muted);margin-bottom:12px">15 seconds per question. Faster = more points!</p>
<input class="compete-input" id="comp-name" placeholder="Your name...">
<button class="compete-btn" onclick="startComp()">🚀 Start!</button>
<div style="margin-top:12px"><ul class="leaderboard" id="leaderboard"></ul></div></div>
<div id="comp-game-area" style="display:none">
<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px"><span id="comp-qnum"></span><span id="comp-timeleft" style="color:var(--warning)"></span></div>
<div class="timer-bar"><div class="timer-fill" id="comp-timer-fill"></div></div>
<div class="compete-q" id="comp-q"></div>
<input class="compete-input" id="comp-ans" placeholder="Answer..." autocomplete="off">
<button class="compete-btn" onclick="submitCompAns()">Submit ↵</button>
<div style="display:flex;justify-content:space-between;margin-top:8px">
<span style="font-size:13px;color:var(--muted)">Score: <strong style="color:var(--warning);font-family:var(--mono)" id="comp-score">0</strong></span>
<span id="comp-feedback" style="font-size:13px;font-weight:700"></span></div></div>
<div id="comp-end-area" style="display:none;text-align:center">
<div style="font-size:40px;margin-bottom:8px">🎉</div>
<p style="font-size:18px;font-weight:700">Well done, <span id="comp-final-name"></span>!</p>
<div class="score-display" id="comp-final-score">0</div>
<button class="compete-btn" onclick="resetComp()">🔄 Play Again</button>
<ul class="leaderboard" id="leaderboard"></ul></div></div>` },
];

const COMP_Qs = [
  { q:`Which search algorithm requires sorted data?`, answers:[`binary search`,`Binary Search`] },
  { q:`What is the complexity of linear search?`, answers:[`O(n)`] },
  { q:`What is the complexity of binary search?`, answers:[`O(log n)`] },
  { q:`What is the complexity of bubble sort?`, answers:[`O(n²)`,`O(n2)`] },
  { q:`What strategy does merge sort use?`, answers:[`divide and conquer`] },
  { q:`Which is faster on large data — bubble or merge sort?`, answers:[`merge sort`,`merge`] },
  { q:`What does binary search do when the target is less than the midpoint?`, answers:[`search left half`,`go left`,`search lower half`] },
  { q:`How many comparisons does binary search need for 1024 items (worst case)?`, answers:[`10`] },
  { q:`What does O(n) mean?`, answers:[`linear time`,`grows linearly`] },
  { q:`What does bubble sort compare?`, answers:[`adjacent items`,`adjacent elements`,`neighbouring items`] },
  { q:`What value does a search return if the item is not found?`, answers:[`−1`,`-1`] },
  { q:`What is O(n log n) an example of?`, answers:[`merge sort complexity`,`efficient sorting`] },
];

// ── RENDER ──────────────────────────────────────────────────
let cur = 0;
function render() {
  const s = SLIDES[cur], total = SLIDES.length;
  const typeLabel = s.type === 'compete' ? 'Competition' : s.type.charAt(0).toUpperCase() + s.type.slice(1);
  document.getElementById('slide').innerHTML =
    '<div class="eyebrow">' +
      '<span class="stype t-' + s.type + '">' + typeLabel + '</span>' +
      '<span class="snum">Slide ' + (cur+1) + ' of ' + total + '</span>' +
    '</div>' +
    '<h1>' + s.title + '</h1>' +
    '<div class="sb">' + (s.body || '') + '</div>';
  if (s.onRender) setTimeout(s.onRender, 80);
  document.getElementById('prog').style.width = ((cur+1)/total*100) + '%';
  document.getElementById('sctr').textContent = (cur+1) + ' / ' + total;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === total - 1;
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  SLIDES.forEach((sl, i) => {
    const d = document.createElement('div');
    const isCompete = sl.type === 'compete';
    d.className = 'pdot' + (isCompete ? ' compete-dot' : '') + (i===cur?' active':i<cur?' done':'');
    d.onclick = () => { cur=i; render(); };
    d.title = sl.title;
    dots.appendChild(d);
  });
}
function goNext() { if (cur < SLIDES.length-1) { cur++; render(); } }
function goPrev() { if (cur > 0) { cur--; render(); } }
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
});
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'filter') {
    document.body.classList.remove('nature-green','superpower');
    if (e.data.filter) document.body.classList.add(e.data.filter);
  }
});

// ── TASK CHECK HELPER ────────────────────────────────────────
function chk(inputId, fbId, correct) {
  const val = document.getElementById(inputId).value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  correct = String(correct).toLowerCase().replace(/[^a-z0-9]/g,'');
  const ans = String(correct).toLowerCase().replace(/\s+/g,'');
  const ok  = val === ans;
  const fb  = document.getElementById(fbId);
  fb.className = 'fb ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? '✓ Correct!' : '✗ Try again — answer: ' + correct;
}
function chkAny(inputId, fbId, answers) {
  const clean = s => String(s).toLowerCase().replace(/[^a-z0-9]/g,'');
  const val = clean(document.getElementById(inputId).value.trim());
  const ok  = answers.map(a=>clean(a)).includes(val);
  const fb  = document.getElementById(fbId);
  fb.className = 'fb ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? '✓ Correct!' : '✗ Try again — answer: ' + answers[0];
}

// ── COMPETITION ENGINE ───────────────────────────────────────
let compState = { score:0, qIdx:0, timer:null, timeLeft:15, active:false, name:'' };

function startComp() {
  const nameEl = document.getElementById('comp-name');
  if (!nameEl || !nameEl.value.trim()) { alert('Enter your name first!'); return; }
  compState.name = nameEl.value.trim();
  compState.score = 0;
  compState.qIdx = 0;
  compState.active = true;
  document.getElementById('comp-start-area').style.display = 'none';
  document.getElementById('comp-game-area').style.display = 'block';
  document.getElementById('comp-end-area').style.display = 'none';
  nextCompQ();
}

function nextCompQ() {
  if (compState.qIdx >= COMP_Qs.length) { endComp(); return; }
  clearInterval(compState.timer);
  compState.timeLeft = 15;
  const q = COMP_Qs[compState.qIdx];
  document.getElementById('comp-q').textContent = q.q;
  document.getElementById('comp-ans').value = '';
  document.getElementById('comp-ans').focus();
  document.getElementById('comp-score').textContent = compState.score;
  document.getElementById('comp-qnum').textContent = (compState.qIdx+1) + ' / ' + COMP_Qs.length;
  document.getElementById('comp-feedback').textContent = '';
  updateTimer();
  compState.timer = setInterval(() => {
    compState.timeLeft--;
    updateTimer();
    if (compState.timeLeft <= 0) { clearInterval(compState.timer); autoWrong(); }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById('comp-timer-fill');
  const pct = (compState.timeLeft / 15) * 100;
  if (el) el.style.width = pct + '%';
  const tlEl = document.getElementById('comp-timeleft');
  if (tlEl) tlEl.textContent = compState.timeLeft + 's';
}

function submitCompAns() {
  if (!compState.active) return;
  clearInterval(compState.timer);
  const ans = document.getElementById('comp-ans').value.trim().toLowerCase().replace(/\s+/g,'');
  const q   = COMP_Qs[compState.qIdx];
  const ok  = q.answers.map(a=>String(a).toLowerCase().replace(/\s+/g,'')).includes(ans);
  const fb  = document.getElementById('comp-feedback');
  if (ok) {
    const pts = Math.max(1, compState.timeLeft);
    compState.score += pts;
    fb.style.color = 'var(--success)';
    fb.textContent = '✓ Correct! +' + pts + ' points';
  } else {
    fb.style.color = 'var(--danger)';
    fb.textContent = '✗ Answer: ' + q.answers[0];
  }
  compState.qIdx++;
  setTimeout(nextCompQ, 1200);
}

function autoWrong() {
  const q  = COMP_Qs[compState.qIdx];
  const fb = document.getElementById('comp-feedback');
  fb.style.color = 'var(--danger)';
  fb.textContent = '⏱ Time up! Answer: ' + q.answers[0];
  compState.qIdx++;
  setTimeout(nextCompQ, 1400);
}

function endComp() {
  compState.active = false;
  clearInterval(compState.timer);
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display = 'block';
  document.getElementById('comp-final-score').textContent = compState.score;
  document.getElementById('comp-final-name').textContent = compState.name;
  // Save to leaderboard
  const lb = JSON.parse(localStorage.getItem('ks3_lb_' + LESSON_ID) || '[]');
  lb.push({ name: compState.name, score: compState.score, date: new Date().toLocaleDateString() });
  lb.sort((a,b) => b.score - a.score);
  const top10 = lb.slice(0,10);
  localStorage.setItem('ks3_lb_' + LESSON_ID, JSON.stringify(top10));
  renderLeaderboard(top10);
}

function renderLeaderboard(lb) {
  const el = document.getElementById('leaderboard');
  if (!el) return;
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = lb.length === 0
    ? '<li style="color:var(--text-muted);font-size:13px">No scores yet — be the first!</li>'
    : lb.map((e,i) => '<li><span class="lb-pos">' + (medals[i]||'#'+(i+1)) + '</span><span class="lb-name">' + e.name + '</span><span class="lb-score">' + e.score + ' pts</span></li>').join('');
}

function resetComp() {
  document.getElementById('comp-start-area').style.display = 'block';
  document.getElementById('comp-game-area').style.display = 'none';
  document.getElementById('comp-end-area').style.display = 'none';
  compState = { score:0, qIdx:0, timer:null, timeLeft:15, active:false, name:'' };
}

document.addEventListener('keydown', e => {
  if (e.target.id === 'comp-ans' && e.key === 'Enter') { e.preventDefault(); submitCompAns(); }
});
render();


</script></body></html>
